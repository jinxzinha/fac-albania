<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ALBANIA</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
display:flex;
min-height:100vh;
background-image:url('https://r2.fivemanage.com/j54gW8QcGKPq6u9xZJLmv/file_0000000007a871fbaa201007af1b2c3e.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.sidebar{
width:250px;
background:rgba(0,0,0,0.92);
border-right:2px solid red;
padding:20px;
min-height:100vh;
}

.logo{
width:100%;
margin-bottom:20px;
border-radius:15px;
}

.profile{
text-align:center;
margin-bottom:20px;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
border:3px solid red;
object-fit:cover;
}

.profile h3{
margin-top:10px;
}

.profile p{
font-size:12px;
color:#ff4d4d;
}

.menu button{
width:100%;
padding:14px;
margin-bottom:10px;
background:#111;
border:1px solid red;
color:white;
border-radius:12px;
cursor:pointer;
}

.menu button:hover,
button.action:hover{
opacity:0.9;
}

button{
transition:0.2s;
}

button:active{
transform:scale(0.98);
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.card{
background:rgba(0,0,0,0.88);
border:1px solid red;
border-radius:18px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,0,0,0.25);
backdrop-filter:blur(3px);
}

input, textarea, select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:10px;
}

button.action{
background:red;
border:none;
padding:12px;
width:100%;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img,
.gallery video{
width:100%;
border-radius:12px;
border:2px solid red;
}

.hidden{
display:none;
}

.cover{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
border:2px solid red;
margin-bottom:20px;
}

.rank{
padding:12px;
border:1px solid red;
border-radius:12px;
margin-bottom:10px;
background:#111;
}

.small{
font-size:12px;
color:red;
font-style:italic;
}

.footer{
text-align:center;
font-size:10px;
color:red;
margin-top:40px;
}

.muni-img{
width:100%;
border-radius:15px;
border:2px solid red;
margin-top:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid red;
padding:10px;
text-align:center;
}

th{
background:red;
}

.approve{
background:green;
border:none;
padding:8px;
color:white;
border-radius:8px;
cursor:pointer;
}

.reject{
background:#700;
border:none;
padding:8px;
color:white;
border-radius:8px;
cursor:pointer;
}

canvas{
max-width:100%;
height:260px !important;
margin-top:20px;
}
</style>
</head>
<body>

<!-- MANTENHA O HTML DO BODY QUE VOCÊ JÁ TEM -->
<!-- A PRINCIPAL CORREÇÃO ESTÁ NO SCRIPT ABAIXO -->

<script>

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let pendentes = JSON.parse(localStorage.getItem("pendentes")) || [];
let vendas = JSON.parse(localStorage.getItem("vendas")) || [];
let acoes = JSON.parse(localStorage.getItem("acoes")) || [];
let galeria = JSON.parse(localStorage.getItem("galeria")) || [];
let municoes = JSON.parse(localStorage.getItem("municoes")) || [];
let logs = JSON.parse(localStorage.getItem("logs")) || [];

let atual = JSON.parse(localStorage.getItem("usuarioAtual")) || null;
let graficoPizza = null;

function salvarTudo(){
localStorage.setItem("usuarios", JSON.stringify(usuarios));
localStorage.setItem("pendentes", JSON.stringify(pendentes));
localStorage.setItem("vendas", JSON.stringify(vendas));
localStorage.setItem("acoes", JSON.stringify(acoes));
localStorage.setItem("galeria", JSON.stringify(galeria));
localStorage.setItem("municoes", JSON.stringify(municoes));
localStorage.setItem("logs", JSON.stringify(logs));
}

function registrarVenda(){

let cliente = document.getElementById("cliente").value.trim();
let membro = document.getElementById("membro").value.trim();
let produto = document.getElementById("produto").value.trim();
let valor = document.getElementById("valor").value.trim();

if(!cliente || !membro || !produto || !valor){
alert("Preencha todos os campos");
return;
}

vendas.push({
cliente,
membro,
produto,
valor,
data:new Date().toLocaleString()
});

salvarTudo();
renderVendas();

["cliente","membro","produto","valor"].forEach(id=>{
document.getElementById(id).value = "";
});

alert("Venda registrada");
}

function registrarAcao(){

let acao = document.getElementById("acaoNome").value.trim();
let lider = document.getElementById("acaoLider").value.trim();
let membros = document.getElementById("acaoMembros").value.trim();
let resultado = document.getElementById("resultado").value;

if(!acao || !lider || !membros){
alert("Preencha todos os campos");
return;
}

acoes.push({
acao,
lider,
membros,
resultado,
data:new Date().toLocaleString()
});

salvarTudo();
renderAcoes();

["acaoNome","acaoLider","acaoMembros"].forEach(id=>{
document.getElementById(id).value = "";
});

alert("Ação registrada");
}

function renderAcoes(){

let vitorias = acoes.filter(a=>a.resultado === "VITÓRIA").length;
let derrotas = acoes.filter(a=>a.resultado === "DERROTA").length;

let total = vitorias + derrotas;

let pv = total ? ((vitorias/total)*100).toFixed(1) : 0;
let pd = total ? ((derrotas/total)*100).toFixed(1) : 0;

document.getElementById("percentuais").innerHTML = `
<div class="rank">Vitórias: ${pv}%</div>
<div class="rank">Derrotas: ${pd}%</div>
<div class="rank">Total de registros: ${total}</div>
`;

const ctx = document.getElementById("grafico");

if(graficoPizza){
graficoPizza.destroy();
}

graficoPizza = new Chart(ctx,{
type:'pie',
data:{
labels:['Vitórias','Derrotas'],
datasets:[{
data:[vitorias, derrotas]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

let html = "";

[...acoes].reverse().forEach(a=>{
html += `
<div class="rank">
${a.acao}<br>
${a.resultado}<br>
Líder: ${a.lider}<br>
Membros: ${a.membros}<br>
${a.data}
</div>
`;
});

document.getElementById("historicoAcoes").innerHTML = html;
}

function addMidia(){

let input = document.getElementById("midiaFile");

if(!input.files.length){
alert("Selecione um arquivo");
return;
}

let file = input.files[0];

if(file.size > 20 * 1024 * 1024){
alert("Arquivo muito grande");
return;
}

let reader = new FileReader();

reader.onload = function(event){

galeria.push({
tipo:file.type,
arquivo:event.target.result,
data:new Date().toLocaleString()
});

salvarTudo();
renderGaleria();

alert("Mídia publicada com sucesso");

input.value = "";
};

reader.readAsDataURL(file);
}

</script>
</body>
</html>
