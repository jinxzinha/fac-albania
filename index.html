</div>  </div>  <script>    
    
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];    
let pendentes = JSON.parse(localStorage.getItem("pendentes")) || [];    
let vendas = JSON.parse(localStorage.getItem("vendas")) || [];    
let acoes = JSON.parse(localStorage.getItem("acoes")) || [];    
let galeria = JSON.parse(localStorage.getItem("galeria")) || [];    
let municoes = JSON.parse(localStorage.getItem("municoes")) || [];    
let logs = JSON.parse(localStorage.getItem("logs")) || [];    
    
let atual = JSON.parse(localStorage.getItem("usuarioAtual")) || null;    
    
function salvarTudo(){    
    
localStorage.setItem("usuarios", JSON.stringify(usuarios));    
localStorage.setItem("pendentes", JSON.stringify(pendentes));    
localStorage.setItem("vendas", JSON.stringify(vendas));    
localStorage.setItem("acoes", JSON.stringify(acoes));    
localStorage.setItem("galeria", JSON.stringify(galeria));    
localStorage.setItem("municoes", JSON.stringify(municoes));    
localStorage.setItem("logs", JSON.stringify(logs));    
    
}    
    
function adicionarLog(texto){    
    
logs.unshift({    
texto:texto,    
data:new Date().toLocaleString()    
});    
    
salvarTudo();    
    
renderLogs();    
    
}    
    
function showTab(tab){    
    
document.getElementById("municoes").classList.add("hidden");    
document.getElementById("vendas").classList.add("hidden");    
document.getElementById("acoes").classList.add("hidden");    
document.getElementById("galeria").classList.add("hidden");    
document.getElementById("admin").classList.add("hidden");    
    
document.getElementById(tab).classList.remove("hidden");    
    
}    
    
function login(){    
    
let u = document.getElementById("loginUser").value;    
let p = document.getElementById("loginPass").value;    
    
if(u === "facalb22" && p === "Jinx@01"){    
    
atual = {    
nome:"Administrador",    
id:"ALBANIA ADM",    
foto:localStorage.getItem("adminFoto") || "https://i.imgur.com/6VBx3io.png",    
admin:true    
};    
    
localStorage.setItem("usuarioAtual", JSON.stringify(atual));    
    
entrar();    
return;    
    
}    
    
let usuario = usuarios.find(x => x.user === u && x.pass === p);    
    
if(!usuario){    
alert("Login inválido");    
return;    
}    
    
usuario.lastLogin = new Date().toLocaleString();    
    
atual = usuario;    
    
localStorage.setItem("usuarioAtual", JSON.stringify(atual));    
    
salvarTudo();    
    
entrar();    
    
}    
    
function entrar(){    
    
document.getElementById("loginBox").classList.add("hidden");    
document.getElementById("conteudo").classList.remove("hidden");    
    
document.getElementById("profileName").innerText = atual.nome;    
document.getElementById("profileId").innerText = "ID: " + atual.id;    
    
if(atual.foto){    
document.getElementById("avatar").src = atual.foto;    
}    
    
if(atual.admin){    
document.getElementById("adminBtn").classList.remove("hidden");    
document.getElementById("adminMunicao").classList.remove("hidden");    
}    
    
renderTudo();    
    
}    
    
function logout(){    
    
localStorage.removeItem("usuarioAtual");    
    
location.reload();    
    
}    
    
function solicitarCadastro(){    
    
let file = document.getElementById("cadFoto").files[0];    
    
if(!file){    
alert("Selecione uma foto");    
return;    
}    
    
let reader = new FileReader();    
    
reader.onload = function(e){    
    
pendentes.push({    
nome:document.getElementById("cadNome").value,    
id:document.getElementById("cadId").value,    
user:document.getElementById("cadUser").value,    
pass:document.getElementById("cadPass").value,    
foto:e.target.result    
});    
    
salvarTudo();    
    
renderSolicitacoes();    
    
alert("Solicitação enviada com sucesso");    
    
};    
    
reader.readAsDataURL(file);    
    
}    
    
function aprovar(i){    
    
let aprovado = {    
...pendentes[i],    
lastLogin:"Nunca"    
};    
    
usuarios.push(aprovado);    
    
adicionarLog("Cadastro aprovado: " + aprovado.nome);    
    
pendentes.splice(i,1);    
    
salvarTudo();    
    
renderTudo();    
    
alert("Usuário aprovado com sucesso");    
    
}    
    
function recusar(i){    
    
let recusado = pendentes[i];    
    
adicionarLog("Cadastro recusado: " + recusado.nome);    
    
pendentes.splice(i,1);    
    
salvarTudo();    
    
renderTudo();    
    
alert("Solicitação recusada");    
    
}    
    
function renderSolicitacoes(){    
    
let html = "";    
    
pendentes.forEach((p,i)=>{    
    
html += `    
<tr>    
<td>${p.nome}</td>    
<td>${p.user}</td>    
<td>    
<button class="approve" onclick="aprovar(${i})">APROVAR</button>    
<button class="reject" onclick="recusar(${i})">RECUSAR</button>    
</td>    
</tr>    
`;    
    
});    
    
document.getElementById("solicitacoes").innerHTML = html;    
    
}    
    
function renderMembros(){    
    
let html = "";    
    
usuarios.forEach(u=>{    
    
html += `    
<div class="rank">    
<b>${u.nome}</b><br>    
Usuário: ${u.user}<br>    
<div class="small">    
Último login: ${u.lastLogin || "Nunca"}    
</div>    
</div>    
`;    
    
});    
    
document.getElementById("membros").innerHTML = html;    
    
}    
    
function registrarVenda(){    
    
vendas.push({    
cliente:document.getElementById("cliente").value,    
membro:document.getElementById("membro").value,    
produto:document.getElementById("produto").value,    
valor:document.getElementById("valor").value,    
data:new Date().toLocaleString()    
});    
    
salvarTudo();    
    
renderVendas();    
    
alert("Venda registrada");    
    
}    
    
function renderVendas(){    
    
let rankObj = {};    
    
vendas.forEach(v=>{    
rankObj[v.membro] = (rankObj[v.membro] || 0) + 1;    
});    
    
let ordem = Object.entries(rankObj).sort((a,b)=>b[1]-a[1]);    
    
let top = "";    
    
if(ordem[0]) top += `<div class="rank">👑1° ${ordem[0][0]} - ${ordem[0][1]} vendas</div>`;    
if(ordem[1]) top += `<div class="rank">🥈2° ${ordem[1][0]} - ${ordem[1][1]} vendas</div>`;    
if(ordem[2]) top += `<div class="rank">🥉3° ${ordem[2][0]} - ${ordem[2][1]} vendas</div>`;    
    
document.getElementById("ranking").innerHTML = top;    
    
let hist = "";    
    
[...vendas].reverse().forEach(v=>{    
    
hist += `    
<div class="rank">    
${v.membro} vendeu ${v.produto}<br>    
Valor: ${v.valor}<br>    
${v.data}    
</div>    
`;    
    
});    
    
document.getElementById("historicoVendas").innerHTML = hist;    
    
}    
    
function registrarAcao(){    
    
acoes.push({    
acao:document.getElementById("acaoNome").value,    
lider:document.getElementById("acaoLider").value,    
membros:document.getElementById("acaoMembros").value,    
resultado:document.getElementById("resultado").value    
});    
    
salvarTudo();    
    
renderAcoes();    
    
alert("Ação registrada");    
    
}    
    
function renderAcoes(){    
    
let vitorias = acoes.filter(a=>a.resultado==="VITÓRIA").length;    
let derrotas = acoes.filter(a=>a.resultado==="DERROTA").length;    
    
let total = vitorias + derrotas;    
    
let pv = total ? ((vitorias/total)*100).toFixed(1) : 0;    
let pd = total ? ((derrotas/total)*100).toFixed(1) : 0;    
    
document.getElementById("percentuais").innerHTML = `    
<div class="rank">Vitórias: ${pv}%</div>    
<div class="rank">Derrotas: ${pd}%</div>    
<div class="rank">Total de registros: ${total}</div>    
`;    
    
new Chart(document.getElementById("grafico"),{    
type:'pie',    
data:{    
labels:['Vitórias','Derrotas'],    
datasets:[{    
data:[vitorias, derrotas]    
}]    
}    
});    
    
let html = "";    
    
[...acoes].reverse().forEach(a=>{    
    
html += `    
<div class="rank">    
${a.acao}<br>    
${a.resultado}    
</div>    
`;    
    
});    
    
document.getElementById("historicoAcoes").innerHTML = html;    
    
}    
    
function addMidia(){    
    
let input = document.getElementById("midiaFile");    
    
if(!input.files.length){    
alert("Selecione um arquivo");    
return;    
}    
    
let file = input.files[0];    
    
let reader = new FileReader();    
    
reader.onload = function(event){    
    
galeria.push({    
tipo:file.type,    
arquivo:event.target.result    
});    
    
salvarTudo();    
    
renderGaleria();    
    
alert("Mídia publicada com sucesso");    
    
input.value = "";    
    
};    
    
reader.readAsDataURL(file);    
    
}    
    
function renderGaleria(){    
    
let html = "";    
    
galeria.forEach((g,index)=>{    
    
if(g.tipo && g.tipo.includes("video")){    
    
html += `    
<div class="rank">    
    
<video controls style="width:100%;">    
<source src="${g.arquivo}">    
</video>    
    
${atual && atual.admin ? `    
<button class="reject" onclick="removerMidia(${index})">    
REMOVER    
</button>    
` : ""}    
    
</div>    
`;    
    
}else{    
    
html += `    
<div class="rank">    
    
<img src="${g.arquivo}" style="width:100%; border-radius:12px;">    
    
${atual && atual.admin ? `    
<button class="reject" onclick="removerMidia(${index})">    
REMOVER    
</button>    
` : ""}    
    
</div>    
`;    
    
}    
    
});    
    
document.getElementById("galeriaMidia").innerHTML = html;    
    
}    
    
function addMunicao(){    
    
if(!atual || !atual.admin){    
alert("Somente admin");    
return;    
}    
    
let input = document.getElementById("novaMunicao");    
    
if(!input.files.length){    
alert("Selecione uma imagem");    
return;    
}    
    
let file = input.files[0];    
    
let reader = new FileReader();    
    
reader.onload = function(event){    
    
municoes.push(event.target.result);    
    
salvarTudo();    
    
renderMunicoes();    
    
alert("Imagem enviada com sucesso");    
    
input.value = "";    
    
};    
    
reader.readAsDataURL(file);    
    
}    
    
function renderMunicoes(){    
    
let html = "";    
    
municoes.forEach((m,index)=>{    
    
html += `    
<div class="rank">    
    
<img class="muni-img" src="${m}">    
    
${atual && atual.admin ? `    
<button class="reject" onclick="removerMunicao(${index})">    
REMOVER    
</button>    
` : ""}    
    
</div>    
`;    
    
});    
    
document.getElementById("municoesImgs").innerHTML = html;    
    
}    
    
function removerMidia(index){    
    
if(!atual || !atual.admin){    
return;    
}    
    
galeria.splice(index,1);    
    
salvarTudo();    
    
renderGaleria();    
    
}    
    
function removerMunicao(index){    
    
if(!atual || !atual.admin){    
return;    
}    
    
municoes.splice(index,1);    
    
salvarTudo();    
    
renderMunicoes();    
    
}    
    
function alterarAvatar(){    
    
let file = document.getElementById("avatarUpload").files[0];    
    
if(!file){    
alert("Selecione uma foto");    
return;    
}    
    
let reader = new FileReader();    
    
reader.onload = function(e){    
    
document.getElementById("avatar").src = e.target.result;    
    
if(atual.admin){    
    
localStorage.setItem("adminFoto", e.target.result);    
    
}else{    
    
let idx = usuarios.findIndex(x=>x.user===atual.user);    
    
if(idx !== -1){    
    
usuarios[idx].foto = e.target.result;    
    
salvarTudo();    
    
}    
    
}    
    
alert("Foto atualizada");    
    
};    
    
reader.readAsDataURL(file);    
    
}    
    
function alterarFundo(){    
    
let url = document.getElementById("novoFundo").value;    
    
localStorage.setItem("fundo", url);    
    
document.body.style.backgroundImage = `url('${url}')`;    
    
alert("Fundo salvo");    
    
}    
    
function alterarCapa(){    
    
let url = document.getElementById("novaCapa").value;    
    
localStorage.setItem("capa", url);    
    
document.getElementById("coverImage").src = url;    
    
alert("Capa salva");    
    
}    
    
function renderLogs(){    
    
let area = document.getElementById("logsArea");    
    
if(!area) return;    
    
let html = "";    
    
logs.forEach(l=>{    
    
html += `    
<div class="rank">    
${l.texto}    
<div class="small">    
${l.data}    
</div>    
</div>    
`;    
    
});    
    
area.innerHTML = html;    
    
}    
    
function renderTudo(){    
    
renderSolicitacoes();    
renderMembros();    
renderVendas();    
renderAcoes();    
renderGaleria();    
renderMunicoes();    
renderLogs();    
    
}    
    
window.onload = ()=>{    
    
let fundo = localStorage.getItem("fundo");    
let
